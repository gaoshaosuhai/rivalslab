<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="ht" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="1.4" fill="#FFD60A" fill-opacity="0.10"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0F"/>
      <stop offset="100%" stop-color="#15161C"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#ht)"/>

  <!-- Diagonal kapow accent stripe -->
  <polygon points="0,520 1200,360 1200,395 0,555" fill="#FFD60A" fill-opacity="0.08"/>
  <polygon points="0,540 1200,380 1200,388 0,548" fill="#FFD60A" fill-opacity="0.35"/>

  <!-- Lightning bolt logo top-left -->
  <g transform="translate(70, 70)">
    <rect width="80" height="80" rx="14" fill="#FFD60A"/>
    <path d="M50 10 L20 40 L34 40 L26 70 L58 38 L42 38 Z"
          fill="#0B0B0F" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="135"
        font-family="Anton, Impact, Arial Black, sans-serif"
        font-size="56"
        fill="#F5F5F7"
        letter-spacing="6">RIVALSLAB</text>

  <!-- Headline -->
  <text x="70" y="320"
        font-family="Anton, Impact, Arial Black, sans-serif"
        font-size="108"
        fill="#FFD60A"
        letter-spacing="2">TEAM-UP EXPLORER.</text>
  <text x="70" y="430"
        font-family="Anton, Impact, Arial Black, sans-serif"
        font-size="108"
        fill="#F5F5F7"
        letter-spacing="2">MAP-AWARE PICKS.</text>

  <!-- Tagline -->
  <text x="70" y="500"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="26"
        fill="#A0A3AD">Built for Marvel Rivals — patch-aware, mobile-first, queue-tested.</text>

  <!-- Footer chip -->
  <text x="70" y="580"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="20"
        font-weight="600"
        fill="#FFD60A"
        letter-spacing="3">RIVALSLAB.GG</text>
</svg>
